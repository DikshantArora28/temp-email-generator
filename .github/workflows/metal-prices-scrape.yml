name: Scrape Metal Prices

on:
  schedule:
    # 12:00 PM IST = 06:30 UTC (initial capture)
    - cron: '30 6 * * *'
    # 10:58 PM IST = 17:28 UTC (evening re-check)
    - cron: '28 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r metal-prices-scraper/requirements.txt

      - name: Run scraper
        run: python metal-prices-scraper/scraper.py

      - name: Commit and push if CSV changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metal-prices-scraper/prices.csv
          if git diff --staged --quiet; then
            echo "No price changes - nothing to commit."
          else
            git commit -m "Update metal prices ($(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M IST'))"
            git push
          fi
